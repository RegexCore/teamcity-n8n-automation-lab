services:
  teamcity-server:
    build:
      context: .
      dockerfile: docker/teamcity-server/Dockerfile
    container_name: teamcity-server
    restart: unless-stopped
    ports:
      - "${TEAMCITY_HTTP_PORT:-8111}:8111"
    volumes:
      - teamcity_data:/data/teamcity_server/datadir
      - teamcity_logs:/opt/teamcity/logs
    environment:
      TEAMCITY_SERVER_MEM_OPTS: "-Xms1g -Xmx2g -XX:+AlwaysPreTouch"

  teamcity-agent:
    build:
      context: .
      dockerfile: docker/teamcity-agent/Dockerfile
    container_name: teamcity-agent-01
    restart: unless-stopped
    depends_on:
      - teamcity-server
    environment:
      SERVER_URL: "http://teamcity-server:8111"
      AGENT_NAME: "docker-agent-01"
      AGENT_TOKEN: ""
    volumes:
      - agent_conf:/data/teamcity_agent/conf
      - agent_work:/opt/buildagent/work
      - agent_temp:/opt/buildagent/temp
      - agent_system:/opt/buildagent/system
    privileged: false

  n8n:
    build:
      context: .
      dockerfile: docker/n8n/Dockerfile
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_HTTP_PORT:-5678}:5678"
    environment:
      N8N_HOST: "${N8N_HOST:-localhost}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "${N8N_PROTOCOL:-http}"
      WEBHOOK_URL: "${N8N_WEBHOOK_URL:-http://localhost:5678/}"
      GENERIC_TIMEZONE: "${N8N_TIMEZONE:-Europe/Berlin}"
    volumes:
      - n8n_data:/home/node/.n8n

  ollama:
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HTTP_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  teamcity_data:
  teamcity_logs:
  agent_conf:
  agent_work:
  agent_temp:
  agent_system:
  n8n_data:
  ollama_data:
