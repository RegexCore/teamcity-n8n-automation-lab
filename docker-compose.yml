services:
  teamcity-server:
    build:
      context: .
      dockerfile: docker/teamcity-server/Dockerfile
    container_name: teamcity-server
    restart: unless-stopped
    ports:
      - "${TEAMCITY_HTTP_PORT}:8111"
    volumes:
      - teamcity_data:/data/teamcity_server/datadir
      - teamcity_logs:/opt/teamcity/logs
    environment:
      TEAMCITY_SERVER_MEM_OPTS: "-Xms1g -Xmx2g -XX:+AlwaysPreTouch"

  teamcity-agent:
    build:
      context: .
      dockerfile: docker/teamcity-agent/Dockerfile
    container_name: teamcity-agent-01
    restart: unless-stopped
    depends_on:
      - teamcity-server
    environment:
      SERVER_URL: "http://teamcity-server:8111"
      AGENT_NAME: "docker-agent-01"
      AGENT_TOKEN: ""
    volumes:
      - agent_conf:/data/teamcity_agent/conf
      - agent_work:/opt/buildagent/work
      - agent_temp:/opt/buildagent/temp
      - agent_system:/opt/buildagent/system
    privileged: false

  n8n:
    build:
      context: .
      dockerfile: docker/n8n/Dockerfile
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_HTTP_PORT}:5678"
    environment:
      N8N_HOST: "${N8N_HOST}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "${N8N_PROTOCOL}"
      WEBHOOK_URL: "${N8N_WEBHOOK_URL}"
      GENERIC_TIMEZONE: "${N8N_TIMEZONE}"
      TEAMCITY_TOKEN: "${TEAMCITY_TOKEN}"
      TEAMCITY_BASE_URL_N8N: "${TEAMCITY_BASE_URL_N8N}"
      TEAMCITY_AI_STRUCTURE_PATH: "${TEAMCITY_AI_STRUCTURE_PATH}"
      TEAMCITY_AI_FAILED_TESTS_PATH: "${TEAMCITY_AI_FAILED_TESTS_PATH}"
      TEAMCITY_DEFAULT_FAILED_BUILD_TYPE_ID: "${TEAMCITY_DEFAULT_FAILED_BUILD_TYPE_ID}"
      N8N_RESTRICT_FILE_ACCESS_TO: "${N8N_RESTRICT_FILE_ACCESS_TO}"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "${N8N_BLOCK_ENV_ACCESS_IN_NODE}"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data/n8n-exports:/data/n8n-exports

  ollama:
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HTTP_PORT}:11434"
    environment:
      OLLAMA_MODEL: "${OLLAMA_MODEL}"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  teamcity_data:
  teamcity_logs:
  agent_conf:
  agent_work:
  agent_temp:
  agent_system:
  n8n_data:
  ollama_data:
